<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Blacklist Clienți</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>📋 Blacklist Clienți</h1>

    <!-- Formular adăugare client -->
    <form action="{{ url_for('add') }}" method="POST">
        <input type="text" name="name" placeholder="Nume" required>
        <input type="text" name="phone" placeholder="Telefon" required>
        <input type="text" name="reason" placeholder="Motiv">
        <button type="submit">➕ Adaugă</button>
    </form>

    <!-- Formular căutare -->
    <form action="{{ url_for('index') }}" method="GET" style="margin-top: 10px;">
        <input type="text" name="q" value="{{ query }}" placeholder="Caută nume sau telefon">
        <button type="submit">🔍 Caută</button>
    </form>

    <!-- Lista clienți -->
    <h2>Lista Blacklist</h2>
    <form action="{{ url_for('delete') }}" method="POST">
        <table>
            <tr>
                <th>ID</th>
                <th>Nume</th>
                <th>Telefon</th>
                <th>Motiv</th>
                <th>Acțiuni</th>
            </tr>
            {% for client in clients %}
            <tr>
                <td>{{ client[0] }}</td>
                <td>{{ client[1] }}</td>
                <td>{{ client[2] }}</td>
                <td>{{ client[3] }}</td>
                <td>
                    <button type="submit" name="id" value="{{ client[0] }}" onclick="return confirm('Ștergi clientul?')">🗑️ Șterge</button>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5" style="text-align: center;">Niciun client</td></tr>
            {% endfor %}
        </table>
    </form>

    <!-- Butoane DB -->
    <div style="margin-top: 20px;">
        <a href="{{ url_for('download_db') }}">📥 Descarcă baza de date</a>
        <form action="{{ url_for('upload_db') }}" method="POST" enctype="multipart/form-data" style="margin-top: 10px;">
            <input type="file" name="file" required>
            <button type="submit">📤 Încarcă baza de date</button>
        </form>
    </div>
</body>
</html>
