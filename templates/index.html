{% extends "base.html" %}
{% block content %}
<div class="row">
  <div class="col-md-5">
    <div class="card mb-3">
      <div class="card-body">
        <h5 class="card-title">Adaugă client în blacklist</h5>
        <form method="post" action="{{ url_for('add') }}">
          <div class="mb-2">
            <label class="form-label">Nume</label>
            <input class="form-control" name="nume" required />
          </div>
          <div class="mb-2">
            <label class="form-label">Telefon</label>
            <input class="form-control" name="telefon" required />
          </div>
          <button class="btn btn-danger">Adaugă în blacklist</button>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Caută client</h5>
        <form method="get" action="{{ url_for('index') }}">
          <div class="input-group">
            <input class="form-control" name="q" value="{{ query }}" placeholder="Nume sau telefon" />
            <button class="btn btn-outline-secondary">Caută</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-7">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Lista blacklist</h5>
        <form method="post" action="{{ url_for('delete') }}">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>#</th>
                <th>Nume</th>
                <th>Telefon</th>
                <th>Acțiune</th>
              </tr>
            </thead>
            <tbody>
              {% for r in rows %}
              <tr>
                <td>{{ r[0] }}</td>
                <td>{{ r[1] }}</td>
                <td>{{ r[2] }}</td>
                <td>
                  <button type="submit" class="btn btn-sm btn-outline-danger" name="id" value="{{ r[0] }}" onclick="return confirm('Ștergi clientul?')">Șterge</button>
                </td>
              </tr>
              {% else %}
              <tr><td colspan="4" class="text-center">Niciun client</td></tr>
              {% endfor %}
            </tbody>
          </table>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
