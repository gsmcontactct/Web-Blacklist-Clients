<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blacklist Clients</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>📋 Blacklist Clients</h1>

    <!-- Formular adăugare client -->
    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="Nume" required>
        <input type="text" name="phone" placeholder="Telefon" required>
        <input type="text" name="reason" placeholder="Motiv">
        <button type="submit">Adaugă</button>
    </form>

    <h2>Lista</h2>
    <table>
        <tr><th>ID</th><th>Nume</th><th>Telefon</th><th>Motiv</th><th>Acțiuni</th></tr>
        {% for client in clients %}
        <tr>
            <td>{{ client[0] }}</td>
            <td>{{ client[1] }}</td>
            <td>{{ client[2] }}</td>
            <td>{{ client[3] }}</td>
            <td><a href="/delete/{{ client[0] }}">🗑️ Șterge</a></td>
        </tr>
        {% endfor %}
    </table>

    <!-- Butoane DB -->
    <div style="margin-top:20px;">
        <a href="{{ url_for('download_db') }}">📥 Descarcă baza de date</a>
        <form action="{{ url_for('upload_db') }}" method="POST" enctype="multipart/form-data" style="margin-top:10px;">
            <input type="file" name="file" required>
            <button type="submit">📤 Încarcă baza de date</button>
        </form>
    </div>
</body>
</html>
