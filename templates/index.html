<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Blacklist Clienți</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>📋 Blacklist Clienți</h1>

    <!-- Formular adăugare client -->
    <form action="/add" method="POST">
        <input type="text" name="nume" placeholder="Nume" required>
        <input type="text" name="telefon" placeholder="Telefon" required>
        <input type="text" name="motiv" placeholder="Motiv">
        <button type="submit">➕ Adaugă</button>
    </form>

    <!-- Formular căutare -->
    <form action="/" method="GET" style="margin-top: 15px;">
        <input type="text" name="q" value="{{ query }}" placeholder="Caută după nume sau telefon">
        <button type="submit">🔍 Caută</button>
    </form>

    <!-- Lista clienților -->
    <h2>Lista Blacklist</h2>
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>ID</th>
            <th>Nume</th>
            <th>Telefon</th>
            <th>Motiv</th>
            <th>Acțiuni</th>
        </tr>
        {% for client in clients %}
        <tr>
            <td>{{ client[0] }}</td>
            <td>{{ client[1] }}</td>
            <td>{{ client[2] }}</td>
            <td>{{ client[3] }}</td>
            <td>
                <form action="/delete" method="POST" style="display:inline;">
                    <button type="submit" name="id" value="{{ client[0] }}" onclick="return confirm('Ștergi acest client?')">🗑️ Șterge</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="5" style="text-align:center;">Niciun client în blacklist</td>
        </tr>
        {% endfor %}
    </table>

    <!-- Backup DB -->
    <div style="margin-top: 20px;">
        <a href="/download-db">📥 Descarcă baza de date</a>
    </div>

    <!-- Upload DB -->
    <div style="margin-top: 10px;">
        <form action="/upload-db" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">📤 Încarcă baza de date</button>
        </form>
    </div>

</body>
</html>
