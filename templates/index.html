<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Blacklist Clienți</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>📋 Blacklist Clienți</h1>

    <!-- Formular adăugare client -->
    <form action="/add" method="POST">
        <input type="text" name="nume" placeholder="Nume" required>
        <input type="text" name="telefon" placeholder="Telefon" required>
        <input type="text" name="motiv" placeholder="Motiv">
        <button type="submit">➕ Adaugă</button>
    </form>

    <!-- Formular căutare -->
    <form action="/" method="GET" style="margin-top: 10px;">
        <input type="text" name="q" value="{{ query }}" placeholder="Caută după nume sau telefon">
        <button type="submit">🔍 Caută</button>
    </form>

    <h2>📑 Lista</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Nume</th>
            <th>Telefon</th>
            <th>Motiv</th>
            <th>Acțiuni</th>
        </tr>
        {% for client in clients %}
        <tr>
            <td>{{ client[0] }}</td>
            <td>{{ client[1] }}</td>
            <td>{{ client[2] }}</td>
            <td>{{ client[3] }}</td>
            <td>
                <a href="/delete/{{ client[0] }}" onclick="return confirm('Ești sigur că vrei să ștergi acest client?')">🗑️ Șterge</a>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="5">Niciun client în blacklist</td>
        </tr>
        {% endfor %}
    </table>

    <div style="margin-top: 15px;">
        <a href="/download-db">📥 Descarcă baza de date</a>
        <form action="/upload-db" method="POST" enctype="multipart/form-data" style="margin-top: 5px;">
            <input type="file" name="file" required>
            <button type="submit">📤 Încarcă baza de date</button>
        </form>
    </div>
</body>
</html>
