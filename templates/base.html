<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blacklist Clienți</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}">Blacklist Clienți</a>
      <div class="d-flex">
        <a href="{{ url_for('download_db') }}" class="btn btn-outline-light btn-sm me-2">📥 Descarcă DB</a>
        <form method="post" action="{{ url_for('upload_db') }}" enctype="multipart/form-data" class="d-inline">
          <input type="file" name="file" class="form-control form-control-sm d-inline w-auto" required>
          <button class="btn btn-outline-light btn-sm">📤 Încarcă DB</button>
        </form>
      </div>
    </div>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'secondary' if cat=='info' else cat }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
